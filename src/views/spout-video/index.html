<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spout Video Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: auto;
        background: #111;
        display: flex;

  </head>
  <body>
    <spout-video></spout-video>
    <script type="module" src="index.js"></script>
  </body>
